name: ecom-microservices

# ---------------------------------------------------------------------------
# Full local stack: load balancer -> api-gateway -> microservices
# Backing infra: Postgres (db-per-service), Redis, Kafka, Elasticsearch
# Tooling: pgAdmin (DB view), Kafka UI (topics view)
# ---------------------------------------------------------------------------

x-service-base: &service-base
  restart: unless-stopped
  networks: [ecom-net]
  env_file: [.env]

services:
  # ----------------------- Load Balancer (Nginx) -----------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: ecom-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-gateway
    networks: [ecom-net]
    restart: unless-stopped

  # ----------------------- API Gateway (GraphQL + REST) -----------------------
  api-gateway:
    <<: *service-base
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    # Two replicas behind nginx to demonstrate load balancing
    deploy:
      replicas: 2
    expose:
      - "3000"
    environment:
      SERVICE_PORT: 3000
    depends_on:
      - user-service
      - booking-service
      - payment-service
      - search-service

  # ----------------------- User Service -----------------------
  user-service:
    <<: *service-base
    build:
      context: .
      dockerfile: apps/user-service/Dockerfile
    environment:
      SERVICE_PORT: 3001
      DATABASE_URL: ${USER_DATABASE_URL}
    expose: ["3001"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }

  # ----------------------- Booking Service (SAGA orchestrator) -----------------------
  booking-service:
    <<: *service-base
    build:
      context: .
      dockerfile: apps/booking-service/Dockerfile
    environment:
      SERVICE_PORT: 3002
      DATABASE_URL: ${BOOKING_DATABASE_URL}
    expose: ["3002"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }

  # ----------------------- Payment Service (Adapter pattern) -----------------------
  payment-service:
    <<: *service-base
    build:
      context: .
      dockerfile: apps/payment-service/Dockerfile
    environment:
      SERVICE_PORT: 3003
      DATABASE_URL: ${PAYMENT_DATABASE_URL}
    expose: ["3003"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }

  # ----------------------- Search Service (Elasticsearch) -----------------------
  search-service:
    <<: *service-base
    build:
      context: .
      dockerfile: apps/search-service/Dockerfile
    environment:
      SERVICE_PORT: 3004
    expose: ["3004"]
    depends_on:
      elasticsearch: { condition: service_healthy }
      kafka: { condition: service_healthy }

  # ----------------------- Postgres -----------------------
  postgres:
    image: postgres:16-alpine
    container_name: ecom-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: user_db,booking_db,payment_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [ecom-net]
    restart: unless-stopped

  # ----------------------- pgAdmin (data view) -----------------------
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: ecom-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ecom.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks: [ecom-net]
    restart: unless-stopped

  # ----------------------- Redis -----------------------
  redis:
    image: redis:7-alpine
    container_name: ecom-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [ecom-net]
    restart: unless-stopped

  # ----------------------- Kafka (KRaft, no Zookeeper) -----------------------
  kafka:
    image: bitnami/kafka:3.7
    container_name: ecom-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "broker,controller"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafkadata:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks: [ecom-net]
    restart: unless-stopped

  # ----------------------- Kafka UI (topics view) -----------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ecom-kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: ecom
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      - kafka
    networks: [ecom-net]
    restart: unless-stopped

  # ----------------------- Elasticsearch -----------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: ecom-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks: [ecom-net]
    restart: unless-stopped

networks:
  ecom-net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  kafkadata:
  esdata:
