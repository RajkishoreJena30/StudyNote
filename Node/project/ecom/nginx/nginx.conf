worker_processes auto;

events {
  worker_connections 1024;
}

http {
  # ------------------------------------------------------------------
  # Load balancing across api-gateway replicas.
  #
  # With Docker Compose `deploy.replicas`, the service name "api-gateway"
  # resolves (via Docker's embedded DNS at 127.0.0.11) to ALL replica IPs.
  # We use a `resolver` + a variable in proxy_pass so nginx re-resolves at
  # request time and spreads traffic across replicas (round-robin DNS)
  # instead of caching a single IP at startup.
  # ------------------------------------------------------------------
  resolver 127.0.0.11 valid=10s ipv6=off;

  server {
    listen 80;
    server_name _;

    # Forward real client info downstream
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Retry the next replica on transient upstream failures (fault tolerance).
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_connect_timeout 3s;
    proxy_read_timeout 30s;

    set $upstream http://api-gateway:3000;

    location /health {
      access_log off;
      proxy_pass $upstream/health;
    }

    location / {
      proxy_pass $upstream;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }
  }
}
