name: namayatra-backend

services:
  postgres:
    image: postgres:15
    container_name: namayatra-postgres
    restart: always
    environment:
      POSTGRES_USER: namayatra
      POSTGRES_PASSWORD: namayatra
      POSTGRES_DB: namayatra
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  pgadmin:
    image: dpage/pgadmin4
    container_name: namayatra-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8081:80"
    depends_on:
      - postgres
  
  redis:
    image: redis/redis-stack:6.2.6-v19
    container_name: namayatra-redis
    restart: always
    environment:
      REDIS_ARGS: "--requirepass namayatra" 
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis_data:/data
  

volumes:
  postgres_data:
  redis_data: