worker_processes auto;

events {
  worker_connections 1024;
}

http {
  # Round-robin / least-connections across the API gateway replicas.
  upstream gateway_backend {
    least_conn;
    server api-gateway-1:3000 max_fails=3 fail_timeout=30s;
    server api-gateway-2:3000 max_fails=3 fail_timeout=30s;
  }

  # Basic rate limiting at the edge (in addition to the app-level throttler).
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

  server {
    listen 80;
    server_name _;

    client_max_body_size 2m;

    # Load-balancer health endpoint (does not require auth).
    location /health {
      proxy_pass http://gateway_backend/health;
    }

    location / {
      limit_req zone=api_limit burst=40 nodelay;

      proxy_pass http://gateway_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";

      proxy_connect_timeout 5s;
      proxy_read_timeout 60s;
    }
  }
}
